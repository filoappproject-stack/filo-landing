<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .wordmark { font-family: -apple-system,'Helvetica Neue',Arial,sans-serif; font-size: 64px; font-weight: 500; letter-spacing: 12px; fill: #0F1E4A; }
      .tagline  { font-family: -apple-system,'Helvetica Neue',Arial,sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 4px; fill: #3B6FE8; }
      .icolabel { font-family: -apple-system,'Helvetica Neue',Arial,sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 2px; }
    </style>
  </defs>

  <circle cx="150" cy="150" r="100" fill="none" stroke="#3B6FE8" stroke-width="1" opacity="0.35"/>
  <circle cx="150" cy="150" r="94"  fill="none" stroke="#3B6FE8" stroke-width="0.6" opacity="0.18"/>
  <circle cx="150" cy="150" r="86" fill="#D6E4FF" opacity="0.85"/>

  <line x1="150" y1="122" x2="150" y2="82"  stroke="#1A4FCC" stroke-width="2.5"/>
  <line x1="178" y1="150" x2="218" y2="150" stroke="#1A8C62" stroke-width="2.5"/>
  <line x1="150" y1="178" x2="150" y2="218" stroke="#1A6AAF" stroke-width="2.5"/>
  <line x1="122" y1="150" x2="82"  y2="150" stroke="#1A4FCC" stroke-width="2.5"/>

  <line x1="146" y1="100" x2="154" y2="100" stroke="#1A4FCC" stroke-width="1.5"/>
  <line x1="200" y1="146" x2="200" y2="154" stroke="#1A8C62" stroke-width="1.5"/>
  <line x1="146" y1="200" x2="154" y2="200" stroke="#1A6AAF" stroke-width="1.5"/>
  <line x1="100" y1="146" x2="100" y2="154" stroke="#1A4FCC" stroke-width="1.5"/>

  <circle cx="150" cy="150" r="20" fill="#ffffff" stroke="#1A4FCC" stroke-width="2.5"/>
  <circle cx="150" cy="150" r="14" fill="none" stroke="#1A4FCC" stroke-width="1.8"/>
  <circle cx="150" cy="150" r="8"  fill="none" stroke="#1A8C62" stroke-width="1.8"/>
  <circle cx="150" cy="150" r="4"  fill="#1A4FCC"/>

  <!-- NORD: Calendar -->
  <circle cx="150" cy="64" r="24" fill="#1A4FCC" stroke="#0F3599" stroke-width="1.5"/>
  <rect x="139" y="53" width="22" height="19" rx="3" fill="#ffffff"/>
  <line x1="143" y1="53" x2="143" y2="49" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="157" y1="53" x2="157" y2="49" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="139" y1="60" x2="161" y2="60" stroke="#1A4FCC" stroke-width="1.2"/>
  <rect x="142" y="63" width="5" height="5" rx="1" fill="#1A4FCC"/>
  <rect x="150" y="63" width="5" height="5" rx="1" fill="#1A4FCC" opacity="0.5"/>
  <text x="150" y="100" text-anchor="middle" class="icolabel" fill="#0F3599">CALENDAR</text>

  <!-- EST: Task -->
  <circle cx="236" cy="150" r="24" fill="#1A8C62" stroke="#0F6045" stroke-width="1.5"/>
  <rect x="225" y="139" width="18" height="18" rx="3" fill="#ffffff"/>
  <path d="M229 148 L233 153 L242 143" fill="none" stroke="#1A8C62" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="236" y="186" text-anchor="middle" class="icolabel" fill="#0F6045">TASK</text>

  <!-- SUD: Note -->
  <circle cx="150" cy="236" r="24" fill="#1A6AAF" stroke="#0F4A82" stroke-width="1.5"/>
  <rect x="139" y="224" width="18" height="21" rx="3" fill="#ffffff"/>
  <line x1="143" y1="231" x2="153" y2="231" stroke="#1A6AAF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="143" y1="236" x2="153" y2="236" stroke="#1A6AAF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="143" y1="241" x2="149" y2="241" stroke="#1A6AAF" stroke-width="1.5" stroke-linecap="round"/>
  <text x="150" y="272" text-anchor="middle" class="icolabel" fill="#0F4A82">NOTE</text>

  <!-- OVEST: Mail -->
  <circle cx="64" cy="150" r="24" fill="#1A4FCC" stroke="#0F3599" stroke-width="1.5"/>
  <rect x="51" y="139" width="26" height="18" rx="3" fill="#ffffff"/>
  <path d="M51 142 L64 150 L77 142" fill="none" stroke="#1A4FCC" stroke-width="2" stroke-linecap="round"/>
  <text x="64" y="186" text-anchor="middle" class="icolabel" fill="#0F3599">MAIL</text>

  <text x="308" y="162" class="wordmark">Filo</text>
  <text x="313" y="188" class="tagline">IL TUO FILO CONDUTTORE</text>
</svg>
